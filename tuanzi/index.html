<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>团子经 - 团子是天</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #fef9f0 0%, #fff6e5 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'PingFang SC', Roboto, 'Helvetica Neue', system-ui, -apple-system, sans-serif;
      padding: 20px;
    }

    .tuanzi-sutra {
      max-width: 700px;
      width: 100%;
      background: #ffffffdd;
      backdrop-filter: blur(6px);
      background: rgba(255, 248, 240, 0.85);
      border-radius: 64px 48px 64px 48px;
      box-shadow: 0 20px 40px rgba(210, 150, 100, 0.2),
                  0 8px 16px rgba(180, 120, 70, 0.1),
                  inset 0 2px 4px rgba(255, 245, 230, 0.8);
      padding: 36px 32px 42px;
      border: 2px solid #ffdbb5;
      transition: all 0.2s ease;
      position: relative;
    }

    /* 装饰团子 + 头像融合 */
    .tuanzi-deco {
      position: absolute;
      top: -18px;
      left: 30px;
      background: #ffb07c;
      color: #fff4e0;
      font-size: 28px;
      line-height: 1;
      padding: 10px 22px 8px 22px;
      border-radius: 80px 40px 40px 80px;
      box-shadow: 0 6px 0 #c47a4e, 0 8px 16px rgba(160, 90, 40, 0.2);
      transform: rotate(-2deg);
      letter-spacing: 2px;
      font-weight: 700;
      border: 2px solid #ffd09a;
      text-shadow: 0 2px 0 #a76030;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .tuanzi-deco span {
      display: inline-block;
      transform: scaleX(-1);
      margin-right: 2px;
    }

    /* 头像框 — 嵌入装饰 */
    .avatar-deco {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 3px solid #ffecda;
      box-shadow: 0 4px 8px rgba(120, 60, 20, 0.3);
      object-fit: cover;
      background: #ffe1c6;
      display: inline-block;
      margin-left: 4px;
      vertical-align: middle;
    }

    .sutra-header {
      margin-top: 18px;
      margin-bottom: 28px;
      border-bottom: 4px dotted #efc9a0;
      padding-bottom: 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    .sutra-title {
      font-size: 2.6rem;
      font-weight: 800;
      color: #7a4a2a;
      letter-spacing: 2px;
      text-shadow: 3px 3px 0 #f7dcc0;
      background: #fce8d4;
      display: inline-block;
      padding: 0 28px 0 16px;
      border-radius: 120px 30px 30px 120px;
      line-height: 1.3;
      transform: rotate(-0.5deg);
      border: 2px solid #dba578;
    }

    .sutra-sub {
      font-size: 1.0rem;
      background: #b47d5a;
      color: #fff3e0;
      padding: 6px 20px;
      border-radius: 60px;
      font-weight: 600;
      letter-spacing: 1px;
      box-shadow: inset 0 -3px 0 #6d4a2e;
      border: 1px solid #dba070;
      margin-top: 6px;
    }

    .commandments {
      list-style: none;
      margin: 28px 0 34px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .commandment-item {
      background: #fffaf2;
      padding: 16px 26px 16px 26px;
      border-radius: 80px 20px 20px 80px;
      border-left: 12px solid #f3b48c;
      box-shadow: 0 6px 0 #d9b494, 0 6px 12px rgba(160, 100, 60, 0.12);
      font-size: 1.15rem;
      font-weight: 550;
      color: #3f2c1c;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: 0.1s ease;
      border: 1px solid #efcfb0;
      word-break: break-word;
      line-height: 1.5;
    }

    .commandment-item::before {
      content: "🍡";
      font-size: 1.8rem;
      margin-right: 14px;
      filter: drop-shadow(0 3px 3px rgba(180, 100, 40, 0.2));
      flex-shrink: 0;
    }

    .commandment-item strong {
      background: #fae1cd;
      padding: 0 12px;
      border-radius: 40px;
      font-weight: 700;
      color: #683f20;
      margin: 0 4px;
      white-space: nowrap;
    }

    .commandment-item .highlight {
      background: #fcd5b0;
      border-radius: 30px;
      padding: 0 12px;
      font-weight: 700;
      color: #5f3a1e;
    }

    .creed-box {
      background: #ffe3cd;
      border-radius: 100px 30px 100px 30px;
      padding: 18px 28px;
      margin: 28px 0 18px;
      border: 3px solid #f7c8a6;
      box-shadow: inset 0 2px 6px #fbeddc, 0 10px 18px rgba(200, 130, 70, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 8px 16px;
    }

    .creed-text {
      font-size: 1.8rem;
      font-weight: 800;
      color: #522f18;
      letter-spacing: 2px;
      text-shadow: 2px 2px 0 #fadbc0;
    }

    .creed-text small {
      font-size: 1.2rem;
      font-weight: 400;
      background: #b77b54;
      color: #fff5e6;
      padding: 0 20px;
      border-radius: 60px;
      line-height: 2;
      margin-left: 6px;
      box-shadow: inset 0 -3px 0 #5f3b22;
      border: 1px solid #c48758;
    }

    /* 头像专区 — 替代点赞区域 */
    .avatar-section {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin: 18px 0 10px;
      flex-wrap: wrap;
      background: #fcf1e5;
      padding: 12px 24px;
      border-radius: 120px;
      border: 2px solid #efd0b6;
      box-shadow: inset 0 2px 6px #f7e5d4;
    }

    .avatar-section .label {
      font-weight: 600;
      color: #684a30;
      font-size: 1.1rem;
      background: #fae2cf;
      padding: 4px 18px;
      border-radius: 60px;
      letter-spacing: 1px;
    }

    .avatar-section img {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 4px solid #fad6b8;
      box-shadow: 0 6px 12px rgba(150, 80, 30, 0.25);
      object-fit: cover;
      background: #fadac0;
      transition: 0.15s ease;
    }

    .avatar-section img:hover {
      transform: scale(1.02);
      border-color: #dba070;
    }

    .tuanzi-seal {
      display: flex;
      justify-content: flex-end;
      margin-top: 12px;
      font-size: 0.95rem;
      color: #b27c5a;
      font-weight: 500;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .tuanzi-seal span {
      background: #f2dcc8;
      padding: 6px 18px;
      border-radius: 60px;
      border: 1px solid #dbb48c;
      color: #543a26;
    }

    .tuanzi-seal .emoji-big {
      font-size: 2.2rem;
      line-height: 1;
    }

    .footnote {
      text-align: center;
      color: #aa7b5a;
      font-size: 0.9rem;
      margin-top: 28px;
      border-top: 2px dashed #eacbb0;
      padding-top: 20px;
      letter-spacing: 0.4px;
    }

    .footnote i {
      font-style: normal;
      background: #f7e1cf;
      padding: 0 8px;
      border-radius: 20px;
      color: #583c28;
    }

    @media (max-width: 550px) {
      .tuanzi-sutra {
        padding: 28px 16px 30px;
        border-radius: 40px 28px 40px 28px;
      }
      .sutra-title {
        font-size: 2.0rem;
        padding: 0 16px 0 12px;
      }
      .commandment-item {
        font-size: 1.0rem;
        padding: 14px 14px 14px 18px;
        border-left-width: 8px;
        border-radius: 40px 12px 12px 40px;
      }
      .commandment-item::before {
        font-size: 1.5rem;
        margin-right: 8px;
      }
      .creed-text {
        font-size: 1.4rem;
      }
      .creed-text small {
        font-size: 1rem;
      }
      .tuanzi-deco {
        font-size: 20px;
        padding: 6px 16px 4px 16px;
        top: -14px;
        left: 16px;
        gap: 6px;
      }
      .avatar-deco {
        width: 34px;
        height: 34px;
      }
      .avatar-section img {
        width: 60px;
        height: 60px;
      }
      .avatar-section {
        padding: 10px 16px;
        gap: 12px;
      }
    }

    @media (max-width: 400px) {
      .sutra-title {
        font-size: 1.7rem;
      }
      .commandment-item {
        font-size: 0.95rem;
        padding: 12px 10px 12px 14px;
      }
      .avatar-section img {
        width: 52px;
        height: 52px;
      }
    }

    .paw-print {
      background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23eaceb0" opacity="0.3"><circle cx="6" cy="6" r="4"/><circle cx="18" cy="6" r="4"/><circle cx="3" cy="16" r="4.5"/><circle cx="12" cy="20" r="5"/><circle cx="21" cy="16" r="4.5"/></svg>');
      background-size: 40px 40px;
      width: 40px;
      height: 40px;
      opacity: 0.3;
      display: inline-block;
      margin-left: 6px;
    }
  </style>
</head>
<body>
  <div class="tuanzi-sutra">
    <!-- 顶部装饰：加入头像 -->
    <div class="tuanzi-deco">
      <span>🐼</span> 团子·经
      <img class="avatar-deco" src="http://q.qlogo.cn/headimg_dl?dst_uin=3882530290&spec=640" alt="团子头像" loading="lazy" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Ccircle cx=%2250%22 cy=%2250%22 r=%2250%22 fill=%22%23f3b48c%22/%3E%3Ctext x=%2250%22 y=%2260%22 text-anchor=%22middle%22 font-size=%2240%22 fill=%22white%22 font-family=%22Arial%22%3E🐼%3C/text%3E%3C/svg%3E'">
    </div>

    <div class="sutra-header">
      <h1 class="sutra-title">🍡 团子是天</h1>
      <div class="sutra-sub">🐾 团子最大</div>
    </div>

    <!-- 十条团子律 -->
    <ul class="commandments">
      <li class="commandment-item"><strong>1.</strong> 团子是天</li>
      <li class="commandment-item"><strong>2.</strong> 不可辱骂团子</li>
      <li class="commandment-item"><strong>3.</strong> 必须点赞团子每一条动态</li>
      <li class="commandment-item"><strong>4.</strong> 必须主动频繁的给团子发消息</li>
      <li class="commandment-item"><strong>5.</strong> 必须要细心的照顾好团子小情绪</li>
      <li class="commandment-item"><strong>6.</strong> 不许和团子玩欲擒故纵吊着团子让团子胡思乱想了</li>
      <li class="commandment-item"><strong>7.</strong> 不能跟其他人讲话忽视掉团子</li>
      <li class="commandment-item"><strong>8.</strong> 不能跟团子大吼大叫</li>
      <li class="commandment-item"><strong>9.</strong> 永远记住团子是最帅的</li>
    </ul>

    <!-- 宗旨 -->
    <div class="creed-box">
      <span class="creed-text">
        🐼 我们的宗旨：<small>团子是天 团子最大</small>
      </span>
    </div>

    <!-- 头像专区 — 替代点赞 -->
    <div class="avatar-section">
      <span class="label">🍡 团子本尊</span>
      <img src="http://q.qlogo.cn/headimg_dl?dst_uin=3882530290&spec=640" alt="团子头像" loading="lazy" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Ccircle cx=%2250%22 cy=%2250%22 r=%2250%22 fill=%22%23f3b48c%22/%3E%3Ctext x=%2250%22 y=%2260%22 text-anchor=%22middle%22 font-size=%2240%22 fill=%22white%22 font-family=%22Arial%22%3E🐼%3C/text%3E%3C/svg%3E'">
      <span style="font-weight: 400; color: #6f4428; background: #fae2cf; padding: 2px 14px; border-radius: 40px; font-size:0.9rem;">✨ 团子最帅</span>
    </div>

    <!-- 团子认证 -->
    <div class="tuanzi-seal">
      <span class="emoji-big">🐼✨</span>
      <span>#团子是天</span>
      <span>#团子最帅</span>
      <span class="paw-print"></span>
    </div>

    <!-- 脚注 -->
    <div class="footnote">
      <i>🍡 团子经 · 每日诵读</i> &nbsp; ｜ &nbsp; 团子永不为奴 <span style="display: inline-block; transform: rotate(8deg);">🐾</span>
    </div>
  </div>

  <script>
    (function() {
      // 轻量提示：致敬“必须主动频繁的给团子发消息” (无点赞功能)
      // 纯粹趣味：显示一条小提醒，但不干扰
      console.log('🍡 团子是天，团子最大。 记住：必须点赞团子每一条动态！ (点赞功能已优雅移除，但精神永存)');

      // 显示一次友好的 "主动发消息" 提示 (只显示一次，且无任何计数)
      const footnote = document.querySelector('.footnote');
      if (footnote) {
        const reminder = document.createElement('span');
        reminder.style.cssText = 'display:inline-block; margin-left: 14px; background: #fadac0; padding: 2px 16px; border-radius: 40px; font-size: 0.9rem; color: #4f321e; border: 1px solid #dba87a;';
        reminder.textContent = '💬 主动给团子发消息~';
        footnote.appendChild(reminder);
        // 5秒后优雅淡出
        setTimeout(() => {
          reminder.style.transition = 'opacity 1.2s';
          reminder.style.opacity = '0';
          setTimeout(() => {
            if (reminder.parentNode) reminder.remove();
          }, 1200);
        }, 5000);
      }

      // 此外，点击头像可以有个小反馈 (趣味)
      const avatarImg = document.querySelector('.avatar-section img');
      if (avatarImg) {
        avatarImg.addEventListener('click', function() {
          this.style.transform = 'scale(0.92)';
          setTimeout(() => {
            this.style.transform = '';
          }, 150);
          // 在控制台输出团子回应
          console.log('🐼 团子感受到了你的注视！');
        });
      }
    })();
  </script>
</body>
</html>
